<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="50%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#00C2CB" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00C2CB" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="80%" cy="20%" r="25%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#glow1)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>
  <rect width="1920" height="1080" fill="url(#glow3)"/>

  <!-- Bokeh circles -->
  <circle cx="200" cy="150" r="60" fill="#00C2CB" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="500" cy="300" r="90" fill="#8B5CF6" opacity="0.05" filter="url(#blur2)"/>
  <circle cx="1400" cy="200" r="70" fill="#F59E0B" opacity="0.04" filter="url(#blur2)"/>
  <circle cx="1600" cy="600" r="100" fill="#00C2CB" opacity="0.05" filter="url(#blur2)"/>
  <circle cx="300" cy="700" r="80" fill="#EC4899" opacity="0.04" filter="url(#blur2)"/>
  <circle cx="800" cy="900" r="50" fill="#10B981" opacity="0.05" filter="url(#blur2)"/>
  <circle cx="1100" cy="100" r="40" fill="#F59E0B" opacity="0.06" filter="url(#blur2)"/>
  <circle cx="1700" cy="400" r="55" fill="#8B5CF6" opacity="0.04" filter="url(#blur2)"/>

  <!-- Small bokeh dots -->
  <circle cx="150" cy="400" r="4" fill="#00C2CB" opacity="0.3"/>
  <circle cx="350" cy="250" r="3" fill="#F59E0B" opacity="0.25"/>
  <circle cx="600" cy="150" r="5" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="900" cy="350" r="3" fill="#00C2CB" opacity="0.3"/>
  <circle cx="1200" cy="500" r="4" fill="#EC4899" opacity="0.2"/>
  <circle cx="1500" cy="300" r="3" fill="#10B981" opacity="0.25"/>
  <circle cx="1000" cy="700" r="5" fill="#F59E0B" opacity="0.2"/>
  <circle cx="700" cy="600" r="3" fill="#00C2CB" opacity="0.3"/>
  <circle cx="1300" cy="800" r="4" fill="#8B5CF6" opacity="0.2"/>
  <circle cx="400" cy="900" r="3" fill="#EC4899" opacity="0.25"/>

  <!-- Camera aperture icon (centered) -->
  <g transform="translate(960, 480)" opacity="0.08">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#00C2CB" stroke-width="3"/>
    <circle cx="0" cy="0" r="160" fill="none" stroke="#00C2CB" stroke-width="1.5"/>
    <!-- Aperture blades -->
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5"/>
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5" transform="rotate(60)"/>
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5" transform="rotate(120)"/>
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5" transform="rotate(180)"/>
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5" transform="rotate(240)"/>
    <path d="M0,-140 L50,-60 L-50,-60 Z" fill="#00C2CB" opacity="0.5" transform="rotate(300)"/>
    <!-- Center circle -->
    <circle cx="0" cy="0" r="40" fill="none" stroke="#00C2CB" stroke-width="2"/>
  </g>

  <!-- Grid lines (rule of thirds) -->
  <line x1="640" y1="0" x2="640" y2="1080" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="1280" y1="0" x2="1280" y2="1080" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="0" y1="360" x2="1920" y2="360" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
  <line x1="0" y1="720" x2="1920" y2="720" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>

  <!-- Typography -->
  <text x="960" y="680" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="#ffffff" opacity="0.15" letter-spacing="8">
    FOTOGRAFIA
  </text>
  <text x="960" y="720" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="300" fill="#ffffff" opacity="0.08" letter-spacing="4">
    TRANSFORME SEU OLHAR
  </text>
</svg>
